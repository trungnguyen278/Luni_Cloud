# docker-compose.dev.yml — Development overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server/app:/app/app:ro          # Hot reload source
      - firmware_storage:/app/storage/firmware
    environment:
      - LOG_LEVEL=debug
      - ENVIRONMENT=development
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app

  ai:
    ports:
      - "127.0.0.1:8081:8081"              # Dev only — expose to host for debugging
    volumes:
      - ./ai:/app:ro
      - ai_models:/app/models
    command: >
      uvicorn server:app
      --host 0.0.0.0
      --port 8081
      --reload

  # Tunnel not needed in dev
  tunnel:
    profiles:
      - tunnel                            # Only starts with --profile tunnel
